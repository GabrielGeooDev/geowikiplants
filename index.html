<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geowikiplants — Plant Wiki for GeoGuessr</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e1a0f;--bg2:#131f14;--bg3:#182119;--surface:#1e2b1f;--surface2:#243026;
    --border:#2e3d30;--accent:#7ec850;--accent2:#a8d87a;--accent3:#4a9e2f;
    --gold:#d4a843;--gold2:#f0c96a;--text:#e8f0e9;--text2:#a8b8aa;--text3:#6a7a6c;
    --red:#e05252;
    --font-display:'Playfair Display',Georgia,serif;
    --font-body:'DM Sans',sans-serif;
    --font-mono:'DM Mono',monospace;
    --r:8px;--r2:14px;
    --shadow:0 4px 24px rgba(0,0,0,.5);
    --shadow-lg:0 12px 48px rgba(0,0,0,.7);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.65;min-height:100vh}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  /* ── NAV ── */
  nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(14,26,15,.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;padding:0 24px;height:56px}
  .nav-logo{font-family:var(--font-display);font-size:21px;color:var(--accent);cursor:pointer;display:flex;align-items:center;gap:8px;letter-spacing:-.3px;text-decoration:none}
  .nav-breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;margin-left:8px;flex:1;overflow:hidden}
  .crumb{color:var(--text2);cursor:pointer;transition:color .2s;white-space:nowrap}.crumb:hover{color:var(--accent)}
  .sep{color:var(--border)}.current{color:var(--accent2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic}
  .nav-search{margin-left:auto;position:relative}
  .nav-search input{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:13px;padding:7px 36px 7px 14px;border-radius:20px;width:210px;outline:none;cursor:pointer;transition:border-color .2s}
  .nav-search input::placeholder{color:var(--text3)}
  .nav-si{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}

  /* ── VIEWS ── */
  .view{display:none;padding-top:56px;min-height:100vh;animation:fadeIn .28s ease}
  .view.active{display:block}
  #view-home{display:none;flex-direction:column;align-items:center;padding:56px 24px 60px}
  #view-home.active{display:flex}
  @keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

  /* ── HOME ── */
  .home-hero{text-align:center;margin-bottom:28px;margin-top:24px}
  .home-hero h1{font-family:var(--font-display);font-size:clamp(30px,5vw,54px);color:var(--text);line-height:1.1;margin-bottom:0}
  .home-hero h1 em{color:var(--accent);font-style:italic}
  .map-stats{color:var(--text3);font-size:13px;font-family:var(--font-mono);margin-bottom:18px}
  .map-stats strong{color:var(--accent2)}
  .wmc{width:100%;max-width:1200px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;box-shadow:var(--shadow-lg)}
  .wmc svg{width:100%;height:auto;display:block}
  .cz{cursor:pointer;transition:filter .22s}.cz:hover{filter:brightness(1.55)}
  .clabel{font-family:var(--font-body);font-weight:700;font-size:13px;fill:var(--text);pointer-events:none;text-anchor:middle;text-transform:uppercase;letter-spacing:1.2px}
  .csub{font-family:var(--font-mono);font-size:10px;fill:var(--text2);pointer-events:none;text-anchor:middle}

  /* ── HOME LINKS ── */
  .home-links{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap;justify-content:center}
  .home-link-play{
    display:flex;align-items:center;gap:10px;
    background:var(--accent3);color:var(--text);
    padding:12px 22px;border-radius:var(--r2);
    text-decoration:none;font-weight:600;font-size:14px;
    transition:all .2s;border:1px solid transparent;
    box-shadow:0 2px 12px rgba(74,158,47,.3);
  }
  .home-link-play:hover{background:var(--accent);color:var(--bg);transform:translateY(-2px);box-shadow:0 4px 20px rgba(126,200,80,.4)}
  .home-link-play .play-icon{font-size:18px}
  .home-link-social{
    display:flex;align-items:center;justify-content:center;gap:9px;
    padding:12px 20px;border-radius:var(--r2);
    text-decoration:none;font-weight:600;font-size:14px;
    transition:all .2s;border:1px solid var(--border);
    background:var(--surface);color:var(--text2);
  }
  .home-link-social:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
  .home-link-discord:hover{background:#5865F2;border-color:#5865F2;color:#fff}
  .home-link-youtube:hover{background:#FF0000;border-color:#FF0000;color:#fff}
  .home-link-social svg{width:20px;height:20px;flex-shrink:0}

  /* ── CONTINENT ── */
  .sec-header{display:flex;align-items:flex-end;gap:16px;margin-bottom:26px;padding-bottom:14px;border-bottom:1px solid var(--border)}
  .sec-header h2{font-family:var(--font-display);font-size:30px;color:var(--text)}
  .sec-sub{color:var(--text2);font-size:13px;margin-top:4px}
  .cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
  .cat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px;cursor:pointer;transition:all .22s;display:flex;align-items:flex-start;gap:14px;position:relative;overflow:hidden}
  .cat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cc,var(--accent3));opacity:0;transition:opacity .22s}
  .cat-card:hover{border-color:var(--accent3);transform:translateY(-2px);box-shadow:var(--shadow);background:var(--surface2)}
  .cat-card:hover::before{opacity:1}
  .cat-icon{width:42px;height:42px;border-radius:var(--r);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  .cat-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
  .cat-sci{font-family:var(--font-mono);font-size:11px;color:var(--accent2);margin-bottom:4px}
  .cat-count{font-size:12px;color:var(--text3)}

  /* ── LIST ── */
  .list-controls{display:flex;gap:10px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
  .search-bar{flex:1;min-width:180px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:14px;padding:9px 14px;border-radius:var(--r);outline:none;transition:border-color .2s}
  .search-bar:focus{border-color:var(--accent)}.search-bar::placeholder{color:var(--text3)}
  .diff-filter{display:flex;gap:5px;flex-wrap:wrap}
  .df-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:7px 11px;border-radius:var(--r);font-size:12px;cursor:pointer;transition:all .18s}
  .df-btn.active{background:var(--accent3);border-color:var(--accent3);color:var(--text)}

  .cfilter{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r)}
  .cfilter-lbl{font-size:11px;color:var(--text3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
  .cbtn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:20px;font-size:12px;cursor:pointer;transition:all .14s;display:flex;align-items:center;gap:4px}
  .cbtn.active{background:rgba(126,200,80,.2);border-color:var(--accent);color:var(--accent2)}

  .plant-list{display:grid;gap:3px}
  .pi{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid transparent;border-radius:var(--r);padding:14px 18px;cursor:pointer;transition:all .16s}
  .pi:hover{background:var(--surface2);border-color:var(--border);transform:translateX(4px)}
  .pi-num{font-family:var(--font-mono);font-size:13px;color:var(--text3);width:32px;flex-shrink:0}
  .pi-thumb{width:52px;height:52px;border-radius:var(--r);background:var(--bg3);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:24px}
  .pi-thumb img{width:100%;height:100%;object-fit:cover}
  .pi-name{flex:1;min-width:0}
  .pi-sci{font-family:var(--font-display);font-style:italic;font-size:18px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pi-common{font-size:14px;color:var(--text2)}
  .pi-flags{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px;font-size:16px;line-height:1}
  .pi-tags{display:flex;gap:6px;align-items:center;flex-shrink:0}
  .dstars{display:flex;gap:2px}
  .dstars .s{color:var(--border);font-size:14px}.dstars .s.on{color:var(--gold)}
  .ftag{font-size:12px;padding:4px 10px;border-radius:10px;font-family:var(--font-mono)}
  .fc{background:rgba(126,200,80,.15);color:var(--accent2)}
  .fu{background:rgba(212,168,67,.12);color:var(--gold2)}
  .fr{background:rgba(224,82,82,.12);color:var(--red)}

  /* ── PLANT PAGE ── */
  .plant-wrap{max-width:1200px;margin:0 auto;padding:20px 24px 80px}
  .plant-header{margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:20px}
  .plant-cat-tag{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:13px;padding:5px 14px;border-radius:20px;margin-bottom:14px;font-family:var(--font-mono)}
  .plant-sci{font-family:var(--font-display);font-size:clamp(28px,4vw,52px);font-style:italic;color:var(--text);line-height:1.15;margin-bottom:6px}
  .plant-common{font-size:20px;color:var(--text2);font-weight:300}
  .plant-meta{display:flex;gap:24px;flex-wrap:wrap;margin-top:18px;padding-top:18px;border-top:1px solid var(--border)}
  .mi{display:flex;flex-direction:column;gap:5px}
  .ml{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-family:var(--font-mono)}
  .mv{display:flex;align-items:center;gap:4px;font-size:16px;color:var(--text)}
  .srow{display:flex;gap:3px}
  .star{font-size:16px;color:var(--border)}.star.on{color:var(--gold)}

  /* NEW LAYOUT: left main col + right sidebar */
  .plant-body{display:grid;grid-template-columns:1fr 380px;gap:32px;align-items:start}
  @media(max-width:820px){.plant-body{grid-template-columns:1fr}}

  /* Left: photos → maps → (nothing else) */
  .plant-main{}

  /* PHOTOS GRID */
  .photos-section{margin-bottom:24px}
  .sec-title{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);font-family:var(--font-mono);margin-bottom:10px}
  .photos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
  .photo-slot{aspect-ratio:4/3;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:transform .16s;display:flex;align-items:center;justify-content:center}
  .photo-slot:hover{transform:scale(1.02)}
  .photo-slot img{width:100%;height:100%;object-fit:contain}
  .photo-empty{aspect-ratio:4/3;background:var(--surface);border:1px dashed var(--border);border-radius:var(--r2);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px;flex-direction:column;gap:6px}

  /* MAPS — in main col, below photos */
  .maps-section{margin-bottom:8px}
  .map-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
  .map-tab{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:4px 12px;border-radius:20px;font-size:11px;font-family:var(--font-mono);cursor:pointer;transition:all .14s}
  .map-tab.active{background:rgba(126,200,80,.2);border-color:var(--accent);color:var(--accent2)}
  /* Map frame: natural height, no cropping, full image visible */
  .map-frame{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;display:flex;align-items:center;justify-content:center}
  .map-frame img{width:100%;height:auto;max-height:600px;object-fit:contain;display:block}
  .map-empty-box{padding:40px;text-align:center;color:var(--text3);font-size:13px;background:var(--surface);border:1px dashed var(--border);border-radius:var(--r2)}

  /* RIGHT SIDEBAR */
  .plant-sidebar{display:flex;flex-direction:column;gap:14px;position:sticky;top:70px}
  .sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
  .sc-h{padding:12px 18px;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);font-family:var(--font-mono)}
  .sc-b{padding:16px 18px}

  .desc-block{font-size:16px;line-height:1.85;color:var(--text)}
  .desc-block em{color:var(--accent2);font-style:italic}

  .tip-list{list-style:none;display:flex;flex-direction:column;gap:7px}
  .tip-item{display:flex;gap:10px;align-items:flex-start;font-size:15px;color:var(--text2);padding:11px 14px;background:var(--bg3);border-radius:var(--r)}
  .tip-icon{color:var(--accent);flex-shrink:0;font-size:13px;margin-top:2px}

  .sim-list{display:flex;gap:8px;flex-wrap:wrap}
  .sim-tag{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:7px 16px;font-family:var(--font-display);font-style:italic;font-size:15px;color:var(--text2);cursor:pointer;transition:all .18s}
  .sim-tag:hover{border-color:var(--accent3);color:var(--accent2)}

  .taxo-tbl{width:100%}
  .taxo-tbl tr{border-bottom:1px solid var(--border)}.taxo-tbl tr:last-child{border-bottom:none}
  .taxo-tbl td{padding:9px 0;font-size:15px}
  .taxo-tbl td:first-child{color:var(--text3);font-family:var(--font-mono);font-size:11px;width:90px}
  .taxo-tbl td:last-child{color:var(--text);font-style:italic}

  .ext-links{display:flex;flex-direction:column;gap:8px}
  .ext-link{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--r);background:var(--bg3);border:1px solid var(--border);text-decoration:none;color:var(--text2);font-size:15px;transition:all .18s}
  .ext-link:hover{border-color:var(--accent3);color:var(--accent2)}

  /* ── SEARCH OVERLAY ── */
  .search-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);display:none;align-items:flex-start;justify-content:center;padding-top:80px}
  .search-overlay.open{display:flex}
  .search-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);width:100%;max-width:600px;box-shadow:var(--shadow-lg);overflow:hidden}
  .sib{width:100%;background:none;border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:var(--font-display);font-style:italic;font-size:20px;padding:18px 22px;outline:none}
  .sib::placeholder{color:var(--text3)}
  .srl{max-height:380px;overflow-y:auto}
  .sr{display:flex;gap:12px;align-items:center;padding:12px 18px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border)}
  .sr:hover{background:var(--surface)}
  .sr-sci{font-family:var(--font-display);font-style:italic;font-size:15px;color:var(--text)}
  .sr-info{font-size:12px;color:var(--text2)}

  /* ── LIGHTBOX ── */
  .lightbox{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center}
  .lightbox.open{display:flex}
  .lightbox img{max-width:92vw;max-height:92vh;border-radius:var(--r2);box-shadow:var(--shadow-lg);object-fit:contain}
  .lb-close{position:absolute;top:18px;right:18px;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:20px;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}

  /* ── MISC ── */
  .back-btn{display:inline-flex;align-items:center;gap:7px;color:var(--text2);font-size:14px;cursor:pointer;background:none;border:none;font-family:var(--font-body);margin-bottom:20px;transition:color .18s;padding:0}
  .back-btn:hover{color:var(--accent)}
  .toast{position:fixed;bottom:24px;right:24px;z-index:300;background:var(--accent3);color:var(--text);padding:10px 18px;border-radius:var(--r);font-size:14px;font-weight:500;transform:translateY(80px);opacity:0;transition:all .28s;box-shadow:var(--shadow)}
  .toast.show{transform:translateY(0);opacity:1}
  .inner{max-width:1200px;margin:0 auto;padding:20px 24px 60px}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" onclick="goHome()">🌿 Geowikiplants</a>
  <div class="nav-breadcrumb" id="bc"></div>
  <div class="nav-search">
    <input type="text" placeholder="Search… (⌘K)" onclick="openSearch()" readonly>
    <span class="nav-si">⌕</span>
  </div>
</nav>

<div class="toast" id="toast"></div>

<div class="lightbox" id="lightbox" onclick="closeLb()">
  <button class="lb-close" onclick="event.stopPropagation();closeLb()">✕</button>
  <img id="lb-img" src="" alt="">
</div>

<div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="search-box">
    <input class="sib" placeholder="Search species, country…" id="searchInput" oninput="filterSearch(this.value)">
    <div class="srl" id="searchResults"></div>
  </div>
</div>

<!-- HOME -->
<div class="view active" id="view-home">
  <div class="home-hero">
    <h1>Identify plants<br>for <em>GeoGuessr</em></h1>
  </div>
  <div class="map-stats"><strong id="stat-count">0</strong> species indexed &nbsp;·&nbsp; <strong>6</strong> regions</div>
  <div class="wmc">
    <svg viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e2b1f" stroke-width="0.5"/></pattern>
        <radialGradient id="og" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#162a30"/><stop offset="100%" stop-color="#0c1a1e"/></radialGradient>
      </defs>
      <rect width="1000" height="520" fill="url(#og)"/>
      <rect width="1000" height="520" fill="url(#grid)" opacity="0.4"/>
      <line x1="0" y1="260" x2="1000" y2="260" stroke="#2a4040" stroke-width="1" stroke-dasharray="4,8" opacity=".5"/>
      <!-- NORTH AMERICA -->
      <g class="cz" onclick="goContinent('north-america')">
        <path d="M 75 58 L 285 58 L 305 80 L 315 132 L 294 182 L 272 222 L 242 252 L 202 262 L 172 272 L 148 262 L 118 242 L 93 212 L 73 180 L 63 140 L 68 88 Z" fill="#2a1f1a" stroke="#3d2d28" stroke-width="1.5"/>
        <path d="M 202 262 L 242 252 L 242 282 L 232 322 L 212 342 L 192 332 L 175 302 L 172 272 Z" fill="#251d19" stroke="#3d2d28" stroke-width="1.5"/>
        <text class="clabel" x="190" y="166" fill="#e8a890">NORTH AMERICA</text>
        <text class="csub" x="190" y="182" id="svg-na">0 species</text>
      </g>
      <!-- SOUTH AMERICA -->
      <g class="cz" onclick="goContinent('south-america')">
        <path d="M 172 350 L 258 344 L 284 364 L 288 404 L 278 444 L 258 474 L 232 492 L 206 492 L 186 474 L 168 444 L 162 404 L 164 368 Z" fill="#1a2230" stroke="#28303d" stroke-width="1.5"/>
        <text class="clabel" x="225" y="418" fill="#8dc8e8">SOUTH AMERICA</text>
        <text class="csub" x="225" y="434" id="svg-sa">0 species</text>
      </g>
      <!-- EUROPE -->
      <g class="cz" onclick="goContinent('europe')">
        <path d="M 438 52 L 522 52 L 544 68 L 548 100 L 538 122 L 512 138 L 490 143 L 464 138 L 444 122 L 430 100 L 428 72 Z" fill="#1a2a1a" stroke="#2a3d2a" stroke-width="1.5"/>
        <text class="clabel" x="488" y="98" fill="#9cd870">EUROPE</text>
        <text class="csub" x="488" y="114" id="svg-eu">0 species</text>
      </g>
      <!-- AFRICA -->
      <g class="cz" onclick="goContinent('africa')">
        <path d="M 448 158 L 542 152 L 564 172 L 572 214 L 568 264 L 558 314 L 542 364 L 522 404 L 500 428 L 478 434 L 458 428 L 440 404 L 426 364 L 418 314 L 414 264 L 416 214 L 426 172 Z" fill="#2a2010" stroke="#3d3020" stroke-width="1.5"/>
        <text class="clabel" x="492" y="288" fill="#f0d080">AFRICA</text>
        <text class="csub" x="492" y="304" id="svg-af">0 species</text>
      </g>

const S={view:'home',cont:null,cat:null,plant:null,diff:'all',cntry:null};

// ═══════════════ NAV HELPERS ═══════════════
function showView(v){
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  S.view=v; renderBc(); window.scrollTo(0,0);
}
function goHome(){S.cont=S.cat=S.plant=null;showView('home');updateStats();}
function goContinent(id){
  S.cont=id;S.cat=S.plant=null;
  const c=CONTS[id];
  document.getElementById('cont-flag').textContent=c.flag;
  document.getElementById('cont-name').textContent=c.name;
  document.getElementById('cont-sub').textContent=c.sub+' · '+PLANTS.filter(p=>p.continent===id).length+' species';
  const g=document.getElementById('catGrid');g.innerHTML='';
  c.cats.forEach(cat=>{
    const n=PLANTS.filter(p=>p.continent===id&&p.category===cat.id).length;
    const d=document.createElement('div');d.className='cat-card';d.style.setProperty('--cc',cat.col);
    d.innerHTML=`<div class="cat-icon">${cat.icon}</div><div><div class="cat-name">${cat.name}</div><div class="cat-sci">${cat.sci}</div><div class="cat-count">${n} species</div></div>`;
    d.onclick=()=>goCategory(id,cat.id);g.appendChild(d);
  });
  showView('continent');
}
function goCategory(cid,catid){
  S.cont=cid;S.cat=catid;S.plant=null;S.cntry=null;S.diff='all';
  const c=CONTS[cid];const cat=c.cats.find(x=>x.id===catid);
  document.getElementById('list-title').textContent=`${cat.name} (${cat.sci})`;
  document.getElementById('list-sub').textContent=c.name+' · Sorted alphabetically by scientific name';
  document.getElementById('list-back').onclick=()=>goContinent(cid);
  document.getElementById('listFilter').value='';
  document.querySelectorAll('.df-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.df-btn').classList.add('active');
  buildCfilter(cid,catid);
  renderList(cid,catid,'','all',null);
  showView('list');
}
function goPlant(id){
  const p=PLANTS.find(x=>x.id===id);if(!p)return;
  S.plant=id;renderPlant(p);
  document.getElementById('plant-back').onclick=()=>goCategory(p.continent,p.category);
  showView('plant');
}

// ═══════════════ BREADCRUMB ═══════════════
function renderBc(){
  const el=document.getElementById('bc');
  if(S.view==='home'){el.innerHTML='';return;}
  let h=`<span class="crumb" onclick="goHome()">🌍 Map</span>`;
  if(S.cont){const c=CONTS[S.cont];h+=`<span class="sep">›</span><span class="crumb" onclick="goContinent('${S.cont}')">${c.name}</span>`;}
  if(S.cat&&S.cont){const cat=CONTS[S.cont].cats.find(x=>x.id===S.cat);if(cat)h+=`<span class="sep">›</span><span class="crumb" onclick="goCategory('${S.cont}','${S.cat}')">${cat.name}</span>`;}
  if(S.view==='plant'&&S.plant){const p=PLANTS.find(x=>x.id===S.plant);if(p)h+=`<span class="sep">›</span><span class="current">${p.sci}</span>`;}
  el.innerHTML=h;
}

// ═══════════════ COUNTRY FILTER ═══════════════
function buildCfilter(cid,catid){
  const ps=PLANTS.filter(p=>p.continent===cid&&p.category===catid);
  const all=[...new Set(ps.flatMap(p=>p.countries||[]))].sort();
  const bar=document.getElementById('cfilter');
  if(!all.length){bar.style.display='none';return;}
  bar.style.display='flex';
  const btns=document.getElementById('cbtns');btns.innerHTML='';
  const allB=document.createElement('button');allB.className='cbtn active';allB.textContent='All';
  allB.onclick=()=>{S.cntry=null;document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('active'));allB.classList.add('active');renderList(cid,catid,document.getElementById('listFilter').value,S.diff,null);};
  btns.appendChild(allB);
  all.forEach(name=>{
    const b=document.createElement('button');b.className='cbtn';
    b.innerHTML=`${cf(name)} ${name}`;
    b.onclick=()=>{S.cntry=name;document.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderList(cid,catid,document.getElementById('listFilter').value,S.diff,name);};
    btns.appendChild(b);
  });
}

// ═══════════════ RENDER LIST ═══════════════
function renderList(cid,catid,filter,diff,cntry){
  let ps=PLANTS.filter(p=>p.continent===cid&&p.category===catid).sort((a,b)=>a.sci.localeCompare(b.sci));
  if(filter){const q=filter.toLowerCase();ps=ps.filter(p=>p.sci.toLowerCase().includes(q)||p.common.toLowerCase().includes(q));}
  if(diff==='easy')ps=ps.filter(p=>p.diff===1);
  if(diff==='medium')ps=ps.filter(p=>p.diff===2);
  if(diff==='hard')ps=ps.filter(p=>p.diff===3);
  if(cntry)ps=ps.filter(p=>(p.countries||[]).includes(cntry));
  const el=document.getElementById('plantList');el.innerHTML='';
  if(!ps.length){el.innerHTML=`<div style="color:var(--text3);text-align:center;padding:48px;font-size:14px">No species found for this filter.</div>`;return;}
  ps.forEach((p,i)=>{
    const d=document.createElement('div');d.className='pi';
    const stars=[1,2,3].map(n=>`<span class="s ${n<=p.diff?'on':''}">★</span>`).join('');
    const fl=p.freq===1?'rare':p.freq===2?'uncommon':'common';
    const fc=p.freq===1?'fr':p.freq===2?'fu':'fc';
    const thumb=p.photos&&p.photos[0]?`<img src="${p.photos[0]}" alt="">`:`<span>🌿</span>`;
    const flags=(p.countries||[]).map(n=>`<span title="${n}">${cf(n)}</span>`).join('');
    d.innerHTML=`<div class="pi-num">${String(i+1).padStart(2,'0')}</div>
      <div class="pi-thumb">${thumb}</div>
      <div class="pi-name">
        <div class="pi-sci">${p.sci}</div>
        <div class="pi-common">${p.common}</div>
        ${flags?`<div class="pi-flags">${flags}</div>`:''}
      </div>
      <div class="pi-tags"><div class="dstars">${stars}</div><span class="ftag ${fc}">${fl}</span></div>`;
    d.onclick=()=>goPlant(p.id);el.appendChild(d);
  });
}
function filterList(v){renderList(S.cont,S.cat,v,S.diff,S.cntry);}
function fDiff(btn,v){document.querySelectorAll('.df-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');S.diff=v;renderList(S.cont,S.cat,document.getElementById('listFilter').value,v,S.cntry);}

// ═══════════════ RENDER PLANT PAGE ═══════════════
function renderPlant(p){
  const cont=CONTS[p.continent];
  const cat=cont.cats.find(c=>c.id===p.category);
  const dStars=[1,2,3].map(n=>`<span class="star ${n<=p.diff?'on':''}">★</span>`).join('');
  const fStars=[1,2,3].map(n=>`<span class="star ${n<=p.freq?'on':''}">★</span>`).join('');
  const maps=(p.maps||[]).map((m,i)=>
    typeof m === 'string' ? {label: 'Map '+(i+1), img: m} : m
  );
  const photos=p.photos||[];

  // — PHOTOS (left col, top)
  const photoSlots=photos.length
    ? photos.map(url=>`<div class="photo-slot" onclick="openLb('${url.replace(/'/g,"\\'")}')" ><img src="${url}" alt="${p.sci}"></div>`).join('')
    : `<div class="photo-empty"><span style="font-size:28px">📷</span><span>No photos yet</span></div>`;
  const photosHTML=`<div class="photos-section">
    <div class="sec-title">Photos</div>
    <div class="photos-grid">${photoSlots}</div>
  </div>`;

  // — MAPS (left col, below photos)
  let mapsHTML='';
  if(maps.length>0){
    const tabs=maps.map((m,i)=>`<button class="map-tab${i===0?' active':''}" id="mt-${p.id}-${i}" onclick="swMap('${p.id}',${i})">${cf(m.label)} ${m.label}</button>`).join('');
    mapsHTML=`<div class="maps-section">
      <div class="sec-title">Distribution maps</div>
      <div class="map-tabs">${tabs}</div>
      <div class="map-frame" id="mframe-${p.id}">
        <img id="mimg-${p.id}" src="${maps[0].img}" alt="Distribution map">
      </div>
    </div>`;
  } else {
    mapsHTML=`<div class="maps-section">
      <div class="sec-title">Distribution maps</div>
      <div class="map-empty-box">🗺️ No distribution maps yet</div>
    </div>`;
  }

  // — SIDEBAR: description, tips, similar, taxonomy, links, countries
  const flagLine=(p.countries||[]).map(n=>`<span title="${n}" style="font-size:17px">${cf(n)}</span>`).join(' ');

  const tipsHTML=p.tips&&p.tips.length
    ?`<div class="sc"><div class="sc-h">Identification tips</div><div class="sc-b"><ul class="tip-list">${p.tips.map(t=>`<li class="tip-item"><span class="tip-icon">✦</span>${t}</li>`).join('')}</ul></div></div>`:'';

  const simHTML=p.similar&&p.similar.length
    ?`<div class="sc"><div class="sc-h">Similar species</div><div class="sc-b"><div class="sim-list">${p.similar.map(s=>{const f=PLANTS.find(x=>x.sci===s);return`<span class="sim-tag" ${f?`onclick="goPlant('${f.id}')"`:''}>${s}</span>`;}).join('')}</div></div></div>`:'';

  let links='';
  if(p.inat) links+=`<a class="ext-link" href="${p.inat}" target="_blank"><span>🔬</span> iNaturalist</a>`;
  if(p.wiki) links+=`<a class="ext-link" href="${p.wiki}" target="_blank"><span>📖</span> Wikipedia</a>`;
  const linksHTML=links?`<div class="sc"><div class="sc-h">External links</div><div class="sc-b"><div class="ext-links">${links}</div></div></div>`:'';

  const countriesHTML=flagLine?`<div class="sc"><div class="sc-h">Countries</div><div class="sc-b" style="display:flex;flex-wrap:wrap;gap:6px">${flagLine}</div></div>`:'';

  document.getElementById('plantContent').innerHTML=`
    <div class="plant-header">
      <div class="plant-cat-tag">${cat.icon} ${cont.name} · ${cat.name}</div>
      <div class="plant-sci">${p.sci}</div>
      <div class="plant-common">${p.common}</div>
      <div class="plant-meta">
        <div class="mi"><div class="ml">Ease of ID</div><div class="mv srow">${dStars}</div></div>
        <div class="mi"><div class="ml">Frequency</div><div class="mv srow">${fStars}</div></div>
        <div class="mi"><div class="ml">Family</div><div class="mv" style="font-style:italic">${p.family||'—'}</div></div>
      </div>
    </div>
    <div class="plant-body">
      <div class="plant-main">
        ${photosHTML}
        ${mapsHTML}
      </div>
      <div class="plant-sidebar">
        <div class="sc">
          <div class="sc-h">Description</div>
          <div class="sc-b"><div class="desc-block">${p.desc}</div></div>
        </div>
        ${tipsHTML}
        ${simHTML}
        ${countriesHTML}
        <div class="sc">
          <div class="sc-h">Taxonomy</div>
          <div class="sc-b"><table class="taxo-tbl">
            <tr><td>Family</td><td>${p.family||'—'}</td></tr>
            <tr><td>Genus</td><td>${p.genus||'—'}</td></tr>
            <tr><td>Species</td><td>${p.sci}</td></tr>
          </table></div>
        </div>
        ${linksHTML}
      </div>
    </div>`;
}

// ═══════════════ MAP TABS ═══════════════
function swMap(pid,i){
  const p=PLANTS.find(x=>x.id===pid);if(!p)return;
  const maps=(p.maps||[]).map((m,j)=>typeof m==='string'?{label:'Map '+(j+1),img:m}:m);
  document.querySelectorAll(`[id^="mt-${pid}-"]`).forEach(t=>t.classList.remove('active'));
  const tab=document.getElementById(`mt-${pid}-${i}`);if(tab)tab.classList.add('active');
  const img=document.getElementById(`mimg-${pid}`);if(img&&maps[i])img.src=maps[i].img;
}

// ═══════════════ LIGHTBOX ═══════════════
function openLb(src){document.getElementById('lb-img').src=src;document.getElementById('lightbox').classList.add('open');}
function closeLb(){document.getElementById('lightbox').classList.remove('open');}

// ═══════════════ SEARCH ═══════════════
function openSearch(){
  document.getElementById('searchOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('searchInput').focus(),40);
  filterSearch('');
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){document.getElementById('searchOverlay').classList.remove('open');document.getElementById('lightbox').classList.remove('open');}
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openSearch();}
});
function filterSearch(v){
  const q=v.toLowerCase();
  const res=PLANTS.filter(p=>!q||p.sci.toLowerCase().includes(q)||p.common.toLowerCase().includes(q)||(p.countries||[]).some(c=>c.toLowerCase().includes(q))).slice(0,14);
  const el=document.getElementById('searchResults');
  if(!res.length){el.innerHTML=`<div style="padding:18px 20px;color:var(--text3);font-size:13px">No results for "${v}"</div>`;return;}
  el.innerHTML=res.map(p=>{
    const cont=CONTS[p.continent];const cat=cont.cats.find(c=>c.id===p.category);
    const flags=(p.countries||[]).slice(0,5).map(n=>cf(n)).join('');
    return `<div class="sr" onclick="document.getElementById('searchOverlay').classList.remove('open');goPlant('${p.id}')">
      <span style="font-size:20px">${cat.icon}</span>
      <div style="flex:1"><div class="sr-sci">${p.sci}</div><div class="sr-info">${p.common} · ${cont.name} / ${cat.name}</div></div>
      <span style="font-size:14px;letter-spacing:1px">${flags}</span>
    </div>`;
  }).join('');
}

// ═══════════════ STATS ═══════════════
function updateStats(){
  document.getElementById('stat-count').textContent=PLANTS.length;
  const m={'africa':'af','south-america':'sa','north-america':'na','europe':'eu','asia':'as','oceania':'oc'};
  Object.entries(m).forEach(([k,v])=>{const e=document.getElementById('svg-'+v);if(e)e.textContent=PLANTS.filter(p=>p.continent===k).length+' species';});
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}

updateStats();
</script>
</body>
</html>
